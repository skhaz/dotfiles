set -ga terminal-features "xterm-ghostty:RGB:sync"

set -g status-position top
set -g status-bg black
set -g status-fg blue

set -g status-left ""
set -g status-right ""
set -g status-justify centre

set -g window-status-current-format "  #W  "
set -g window-status-format "  #W  "
set -g window-status-current-style "bg=#1a3a5c"
set -g window-status-style "bg=#112840"

set -g focus-events on

setw -g mouse on

bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3
bind -n M-5 select-window -t 4
bind -n M-6 select-window -t 5

# set-hook -g after-new-window "split-window -v -l 20% -d -c '#{pane_current_path}'"

bind -n C-l send-keys C-l \; clear-history

bind r source-file ~/.tmux.conf
